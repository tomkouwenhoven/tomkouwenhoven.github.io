<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <header>
    <div class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
    <div class="site-desc">{{ site.description }}</div>
    <nav>
      {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <a href="mailto:{{ site.email }}">{{ site.email }}</a>
    &nbsp;·&nbsp;
    <a href="{{ site.google_scholar }}" target="_blank">Google Scholar</a>
    &nbsp;·&nbsp;
    <a href="{{ site.github }}" target="_blank">GitHub</a>
    &nbsp;·&nbsp;
    <a href="{{ site.orcid }}" target="_blank">ORCID</a>
    &nbsp;·&nbsp;
    <a href="{{ site.dblp }}" target="_blank">DBLP</a>
  </footer>
</body>
</html>
